<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>想要干点什么?</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #F5F5F7;
    --card: rgba(255,255,255,0.62);
    --accent: #5B8AFF;
    --accent-soft: rgba(91,138,255,0.10);
    --accent-mid: rgba(91,138,255,0.22);
    --pink: #FF6B9D;
    --pink-soft: rgba(255,107,157,0.10);
    --text: #1A1A2E;
    --text-sec: #4A4A68;
    --text-muted: #9090A8;
    --border: rgba(0,0,0,0.06);
    --border-focus: rgba(91,138,255,0.40);
    --shadow: 0 2px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
    --shadow-glow: 0 4px 24px rgba(91,138,255,0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --tr: 0.3s cubic-bezier(0.4,0,0.2,1);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== 全局入场动画 ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  /* ===== 背景装饰 ===== */
  .bg-deco { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-blob {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35;
    animation: blobFloat 20s ease-in-out infinite;
  }
  .bg-blob:nth-child(1) { width:500px;height:500px;background:linear-gradient(135deg,#A8C8FF,#C8B8FF);top:-10%;right:-5%; }
  .bg-blob:nth-child(2) { width:400px;height:400px;background:linear-gradient(135deg,#FFB8C8,#FFD8A8);bottom:-5%;left:-5%;animation-delay:-7s; }
  .bg-blob:nth-child(3) { width:300px;height:300px;background:linear-gradient(135deg,#A8E8C8,#A8D8FF);top:40%;left:30%;animation-delay:-14s; }
  @keyframes blobFloat {
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(30px,-20px) scale(1.05);}
    66%{transform:translate(-20px,30px) scale(0.95);}
  }
  /* 背景粒子 Canvas */
  #particleCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    opacity: 0.5;
  }

  /* ===== 顶栏 ===== */
  .header {
    background: rgba(255,255,255,0.58);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    transition: var(--tr);
    animation: fadeIn 0.6s ease-out;
  }
  .header.scrolled { background: rgba(255,255,255,0.78); box-shadow: 0 1px 12px rgba(0,0,0,0.06); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #8B6BFF);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 3px 12px rgba(91,138,255,0.25);
    animation: logoPulse 3s ease-in-out infinite;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .header-logo:hover {
    transform: scale(1.1) rotate(8deg);
    box-shadow: 0 4px 20px rgba(91,138,255,0.4);
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 3px 12px rgba(91,138,255,0.25); }
    50% { box-shadow: 0 3px 20px rgba(91,138,255,0.45), 0 0 30px rgba(91,138,255,0.1); }
  }
  .header-title { font-size: 20px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; }
  .header-actions { display: flex; gap: 8px; }
  .h-btn {
    padding: 9px 18px; border-radius: 24px; font-size: 13px; font-weight: 500;
    border: none; cursor: pointer; transition: var(--tr); font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    white-space: nowrap;
    position: relative; overflow: hidden;
  }
  .h-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    background-size: 200% 100%;
    opacity: 0; transition: opacity 0.3s;
  }
  .h-btn:hover::after { opacity: 1; animation: shimmer 1.5s ease infinite; }
  .h-btn-primary {
    background: linear-gradient(135deg, var(--accent), #7B6BFF); color: #fff;
    box-shadow: var(--shadow-glow);
  }
  .h-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(91,138,255,0.3); }
  .h-btn-primary:active { transform: scale(0.97); }
  .h-btn-outline {
    background: rgba(255,255,255,0.5); border: 1.5px solid var(--border); color: var(--text-sec);
  }
  .h-btn-outline:hover { background: rgba(255,255,255,0.8); border-color: var(--accent-mid); }
  .h-btn-icon {
    padding: 9px; border-radius: 50%; min-width: 40px;
    justify-content: center;
  }

  /* ===== 主体 ===== */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 100px; position: relative; z-index: 1; }

  /* ===== 欢迎语 ===== */
  .welcome {
    background: rgba(255,255,255,0.50);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 20px 24px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    animation: fadeInUp 0.6s ease-out 0.15s both;
  }
  .welcome-emoji {
    font-size: 36px; flex-shrink: 0;
    animation: wave 2.5s ease-in-out infinite, scaleIn 0.5s ease-out 0.3s both;
  }
  @keyframes wave { 0%,100%{transform:rotate(0deg);}25%{transform:rotate(12deg);}75%{transform:rotate(-8deg);} }
  .welcome-text h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px; animation: slideInLeft 0.5s ease-out 0.4s both; }
  .welcome-text p { font-size: 12px; color: var(--text-sec); line-height: 1.6; animation: slideInLeft 0.5s ease-out 0.5s both; }
  .highlight { background: linear-gradient(90deg, var(--accent-soft), var(--pink-soft)); padding: 1px 6px; border-radius: 4px; font-weight: 500; color: var(--accent); }

  /* ===== 分类 Tabs ===== */
  .tabs-bar {
    display: flex; align-items: center; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; padding: 2px 0 6px; scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    animation: fadeInUp 0.5s ease-out 0.3s both;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab {
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: var(--text-sec); cursor: pointer; white-space: nowrap; transition: var(--tr);
    display: flex; align-items: center; gap: 5px;
    flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .tab:active { transform: scale(0.96); }
  .tab:hover { border-color: var(--accent-mid); background: rgba(255,255,255,0.7); color: var(--accent); transform: translateY(-1px); }
  .tab.active {
    background: linear-gradient(135deg, var(--accent), #7B6BFF); color: #fff;
    border-color: transparent; box-shadow: 0 3px 14px rgba(91,138,255,0.25);
    animation: tabPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes tabPop {
    0% { transform: scale(0.9); }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  .tab .count { font-size: 10px; background: rgba(255,255,255,0.25); padding: 1px 6px; border-radius: 8px; }
  .tab-del {
    margin-left: 1px; opacity: 0.4; font-size: 11px; cursor: pointer; transition: var(--tr);
    background: none; border: none; color: inherit; padding: 0 2px; line-height: 1;
  }
  .tab-del:hover { opacity: 1; color: #FF5050; }
  .tab-add {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px dashed rgba(91,138,255,0.3);
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: var(--accent); font-size: 16px; cursor: pointer; transition: var(--tr);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .tab-add:active { transform: scale(0.92); }

  /* ===== 搜索栏 ===== */
  .search-bar {
    position: relative; margin-bottom: 16px;
    animation: fadeInUp 0.5s ease-out 0.4s both;
  }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 42px; border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.50);
    backdrop-filter: blur(16px) saturate(1.2); -webkit-backdrop-filter: blur(16px) saturate(1.2);
    font-size: 15px; font-family: inherit; color: var(--text);
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1); outline: none; box-shadow: var(--shadow);
  }
  .search-bar input:focus {
    border-color: var(--border-focus); background: rgba(255,255,255,0.80);
    box-shadow: 0 0 0 4px rgba(91,138,255,0.08), var(--shadow-lg), 0 0 40px rgba(91,138,255,0.06);
    transform: scale(1.01);
  }
  .search-bar input::placeholder { color: var(--text-muted); transition: opacity 0.3s; }
  .search-bar input:focus::placeholder { opacity: 0.5; }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; color: var(--text-muted); pointer-events: none;
    transition: transform 0.3s ease, color 0.3s ease;
  }
  .search-bar input:focus ~ .search-icon {
    transform: translateY(-50%) scale(1.15);
    color: var(--accent);
  }

  /* ===== 链接网格 ===== */
  .link-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px;
    animation: fadeIn 0.4s ease-out 0.5s both;
  }
  .link-card {
    background: rgba(255,255,255,0.52);
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    border-radius: var(--radius); padding: 16px 18px;
    box-shadow: var(--shadow);
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer; position: relative;
    border: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
    text-decoration: none; color: inherit;
    -webkit-user-drag: none;
    overflow: hidden;
    /* 入场动画 */
    opacity: 0; transform: translateY(20px) scale(0.97);
  }
  .link-card.visible {
    animation: cardEnter 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .link-card::before {
    content: '';
    position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
      rgba(91,138,255,0.08) 0%, transparent 50%);
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none; z-index: 0;
  }
  .link-card:hover::before { opacity: 1; }
  .link-card:hover {
    box-shadow: var(--shadow-lg), 0 0 30px rgba(91,138,255,0.06);
    transform: translateY(-4px) scale(1.01);
    border-color: var(--accent-mid); background: rgba(255,255,255,0.75);
  }
  .link-card:active { transform: translateY(-2px) scale(0.98); transition-duration: 0.1s; }
  /* 涟漪效果 */
  .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(91,138,255,0.2);
    transform: scale(0); animation: rippleAnim 0.6s ease-out forwards;
    pointer-events: none; z-index: 5;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }
  .link-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    background: var(--accent-soft); border: 1px solid rgba(91,138,255,0.08);
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease;
  }
  .link-card:hover .link-icon {
    transform: scale(1.1) rotate(-5deg);
    box-shadow: 0 4px 12px rgba(91,138,255,0.15);
  }
  .link-body { flex: 1; min-width: 0; pointer-events: none; }
  .link-name {
    font-size: 14px; font-weight: 600; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .link-url {
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
  }
  .link-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .link-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 8px;
    background: var(--accent-soft); color: var(--accent);
  }
  .link-tag:nth-child(2n) { background: var(--pink-soft); color: var(--pink); }

  /* 操作按钮 */
  .link-actions {
    position: absolute; top: 8px; right: 10px;
    display: flex; gap: 4px; opacity: 0; transition: var(--tr); z-index: 10;
  }
  .link-card:hover .link-actions { opacity: 1; }
  .la-btn {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: var(--text-muted); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--tr); box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .la-btn:hover { background: rgba(91,138,255,0.12); color: var(--accent); }
  .la-btn.del:hover { background: rgba(255,80,80,0.12); color: #FF5050; }

  /* 拖拽手柄 */
  .drag-handle {
    position: absolute; bottom: 6px; right: 10px;
    font-size: 12px; color: var(--text-muted); opacity: 0;
    transition: var(--tr); z-index: 10; cursor: grab; letter-spacing: 1px;
  }
  .link-card:hover .drag-handle { opacity: 0.3; }

  /* ===== 空状态 ===== */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); animation: fadeInUp 0.5s ease-out; }
  .empty-icon {
    font-size: 48px; margin-bottom: 12px;
    animation: emptyFloat 3s ease-in-out infinite;
  }
  @keyframes emptyFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-10px) rotate(5deg); }
    75% { transform: translateY(-5px) rotate(-3deg); }
  }
  .empty-text { font-size: 14px; margin-bottom: 4px; font-weight: 500; }
  .empty-sub { font-size: 12px; opacity: 0.7; }

  /* ===== 底部浮动添加按钮 (移动端) ===== */
  .fab {
    display: none;
    position: fixed; bottom: calc(20px + var(--safe-bottom)); right: 20px;
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), #7B6BFF);
    border-radius: 50%; border: none;
    color: #fff; font-size: 24px;
    box-shadow: 0 6px 24px rgba(91,138,255,0.35);
    cursor: pointer; z-index: 90;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    align-items: center; justify-content: center;
    animation: fabBreathe 2.5s ease-in-out infinite;
  }
  .fab:hover {
    transform: scale(1.12);
    box-shadow: 0 8px 32px rgba(91,138,255,0.5);
  }
  .fab:active { transform: scale(0.88); transition-duration: 0.1s; }
  @keyframes fabBreathe {
    0%, 100% { box-shadow: 0 6px 24px rgba(91,138,255,0.35); }
    50% { box-shadow: 0 6px 32px rgba(91,138,255,0.55), 0 0 50px rgba(91,138,255,0.1); }
  }

  /* ===== 弹窗（通用） ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 200; display: none; align-items: center; justify-content: center;
    padding: 20px;
    transition: background 0.3s ease;
  }
  .modal-overlay.open { display: flex; background: rgba(0,0,0,0.25); }
  .modal {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(30px) saturate(1.4);
    -webkit-backdrop-filter: blur(30px) saturate(1.4);
    border: 1px solid var(--border); border-radius: 22px;
    padding: 28px; width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalIn {
    from { opacity:0; transform:translateY(30px) scale(0.9); }
    to { opacity:1; transform:translateY(0) scale(1); }
  }
  .modal-title {
    font-size: 18px; font-weight: 700; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-sec); margin-bottom: 5px; }
  .form-input {
    width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-size: 15px; font-family: inherit;
    color: var(--text); outline: none; transition: var(--tr);
    background: rgba(255,255,255,0.5);
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(91,138,255,0.08); background: rgba(255,255,255,0.8); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
  .modal-sm { max-width: 360px; }
  .m-btn {
    padding: 10px 24px; border-radius: 24px; font-size: 14px; font-weight: 500;
    border: none; cursor: pointer; transition: var(--tr); font-family: inherit;
  }
  .m-btn:active { transform: scale(0.96); }
  .m-btn-cancel { background: rgba(0,0,0,0.04); color: var(--text-sec); }
  .m-btn-cancel:hover { background: rgba(0,0,0,0.08); }
  .m-btn-save {
    background: linear-gradient(135deg, var(--accent), #7B6BFF); color: #fff;
    box-shadow: 0 3px 14px rgba(91,138,255,0.25);
  }
  .m-btn-save:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(91,138,255,0.35); }
  .m-btn-danger {
    background: linear-gradient(135deg, #FF5050, #FF3366); color: #fff;
    box-shadow: 0 3px 14px rgba(255,80,80,0.25);
  }
  .m-btn-danger:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(255,80,80,0.35); }

  /* ===== 图标选择器 ===== */
  .icon-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .icon-opt {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1.5px solid var(--border); background: rgba(255,255,255,0.5);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .icon-opt:active { transform: scale(0.85); }
  .icon-opt:hover { border-color: var(--accent-mid); background: rgba(255,255,255,0.8); transform: scale(1.1); }
  .icon-opt.selected {
    border-color: var(--accent); background: var(--accent-soft);
    box-shadow: 0 0 0 2px rgba(91,138,255,0.15);
    animation: iconPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes iconPop {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* 图标展开/收起 */
  .icon-toggle {
    background: none; border: none; color: var(--accent); font-size: 12px;
    cursor: pointer; padding: 4px 0; font-family: inherit;
  }

  /* ===== 分类芯片选择（移动端友好） ===== */
  .cat-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-chip {
    padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--border); background: rgba(255,255,255,0.5);
    color: var(--text-sec); cursor: pointer; transition: var(--tr);
    font-family: inherit; white-space: nowrap;
  }
  .cat-chip:active { transform: scale(0.92); }
  .cat-chip:hover { border-color: var(--accent-mid); transform: translateY(-1px); }
  .cat-chip.active {
    background: linear-gradient(135deg, var(--accent), #7B6BFF);
    color: #fff; border-color: transparent;
    box-shadow: 0 2px 8px rgba(91,138,255,0.2);
    animation: tabPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed; bottom: calc(32px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(30px) scale(0.9);
    background: rgba(26,26,46,0.88);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    color: #fff; padding: 12px 28px; border-radius: 28px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg); opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 300; pointer-events: none; max-width: 80vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

  /* ===== 拖拽样式 ===== */
  .link-card.dragging { opacity: 0.35; transform: rotate(2deg) scale(0.98); }
  .link-card.drag-over { border-color: var(--accent); border-style: dashed; background: rgba(91,138,255,0.05); }

  /* ===== 移动端适配 ===== */
  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .header-sub { display: none; }
    .header-actions .h-btn-text { display: none; }
    .h-btn-icon { display: flex !important; }
    .main { padding: 16px 14px 120px; }
    .welcome { padding: 16px 18px; gap: 10px; border-radius: 16px; }
    .welcome-emoji { font-size: 28px; }
    .welcome-text h2 { font-size: 14px; }
    .welcome-text p { font-size: 11px; }

    .link-grid { grid-template-columns: 1fr; gap: 10px; }
    .link-card { padding: 14px 16px; border-radius: 14px; min-height: 56px; }

    /* 手机端：操作按钮常驻 */
    .link-actions { display: none; }
    .link-card { flex-wrap: wrap; }
    .link-card-actions-row {
      display: flex; gap: 6px; margin-top: 8px; width: 100%;
      padding-top: 8px; border-top: 1px solid var(--border);
    }
    .mobile-action-btn {
      flex: 1; padding: 10px 0; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: var(--tr);
      display: flex; align-items: center; justify-content: center; gap: 4px;
      background: rgba(0,0,0,0.03); color: var(--text-sec);
      min-height: 40px;
    }
    .mobile-action-btn:active { transform: scale(0.92); background: rgba(0,0,0,0.06); transition-duration: 0.1s; }
    .mobile-action-btn.edit-btn { color: var(--accent); }
    .mobile-action-btn.del-btn { color: #FF5050; }
    .mobile-action-btn.goto-btn { color: var(--accent); background: var(--accent-soft); }

    /* 拖拽手柄在移动端不显示 */
    .drag-handle { display: none; }
    .link-card { -webkit-user-drag: auto; }

    /* 弹窗全屏底部抽屉 */
    .modal-overlay { padding: 0; align-items: flex-end; justify-content: stretch; }
    .modal {
      max-width: 100%; width: 100%; border-radius: 22px 22px 0 0;
      padding: 24px 20px calc(20px + var(--safe-bottom));
      animation: sheetUp 0.35s ease;
      max-height: 85vh; overflow-y: auto;
    }
    .modal-sm { max-width: 100%; }
    .modal-title { font-size: 17px; }

    /* 手机端弹窗改为竖排 */
    .form-row { flex-direction: column; gap: 0; }

    .modal-actions {
      position: sticky; bottom: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 12px 0 0; margin-top: 16px;
    }
    .m-btn { flex: 1; padding: 14px 0; text-align: center; justify-content: center; display: flex; font-size: 15px; min-height: 48px; }

    /* FAB 显示 */
    .fab { display: flex; }

    /* 桌面导出/导入按钮隐藏，用图标 */
    .h-btn-text { display: none; }

    /* 分类芯片更大触控区 */
    .cat-chip { padding: 8px 16px; font-size: 13px; min-height: 38px; display: flex; align-items: center; }

    /* 搜索框更大 */
    .search-bar input { padding: 14px 16px 14px 42px; font-size: 16px; min-height: 48px; }

    /* Tab 更大触控 */
    .tab { padding: 9px 18px; font-size: 14px; min-height: 38px; }
    .tab-add { width: 38px; height: 38px; }
  }

  @media (min-width: 769px) {
    .fab { display: none; }
    .h-btn-icon { display: none !important; }
  }

</style>
</head>
<body>

  <div class="tabs-bar" id="tabsBar"><button class="tab active" onclick="selectCategory('全部')">全部 <span class="count">2</span></button><button class="tab " onclick="selectCategory('常用')">常用 <span class="count">0</span></button><button class="tab-del" onclick="event.stopPropagation();deleteCategory('常用')" title="删掉">✕</button><button class="tab " onclick="selectCategory('开发')">开发 <span class="count">1</span></button><button class="tab-del" onclick="event.stopPropagation();deleteCategory('开发')" title="删掉">✕</button><button class="tab " onclick="selectCategory('摸鱼')">摸鱼 <span class="count">1</span></button><button class="tab-del" onclick="event.stopPropagation();deleteCategory('摸鱼')" title="删掉">✕</button><button class="tab " onclick="selectCategory('设计')">设计 <span class="count">0</span></button><button class="tab-del" onclick="event.stopPropagation();deleteCategory('设计')" title="删掉">✕</button><button class="tab " onclick="selectCategory('生活')">生活 <span class="count">0</span></button><button class="tab-del" onclick="event.stopPropagation();deleteCategory('生活')" title="删掉">✕</button><button class="tab " onclick="selectCategory('学习')">学习 <span class="count">0</span></button><button class="tab-del" onclick="event.stopPropagation();deleteCategory('学习')" title="删掉">✕</button><button class="tab-add" onclick="openCatModal()" title="开辟新浪区">＋</button></div>

  <div class="search-bar">

    <input type="text" id="searchInput" placeholder="想找什么？随便搜搜看～" oninput="renderLinks()">
  </div>

  <div class="link-grid" id="linkGrid"><a class="link-card visible" href="https://github.com" target="_blank" rel="noopener" draggable="true" ondragstart="dragStart(event,'_6kkgnktj')" ondragover="dragOver(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'_6kkgnktj')" ondragend="dragEnd(event)" style="animation-delay: 0s;">
      <div class="link-icon">💻</div>
      <div class="link-body">
        <div class="link-name">GitHub</div>
        <div class="link-url">https://github.com</div>
        <div class="link-tags"><span class="link-tag">代码</span><span class="link-tag">开源</span></div>
      </div>
      <div class="link-actions">
           <button class="la-btn" onclick="event.preventDefault();event.stopPropagation();editLink('_6kkgnktj')" title="改一下">✏️</button>
           <button class="la-btn del" onclick="event.preventDefault();event.stopPropagation();deleteLink('_6kkgnktj')" title="冲掉它">🗑️</button>
         </div>
         <span class="drag-handle" title="拖拽排序">⠿⠿</span>
    </a><a class="link-card visible" href="https://bilibili.com" target="_blank" rel="noopener" draggable="true" ondragstart="dragStart(event,'_jhz520lc')" ondragover="dragOver(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'_jhz520lc')" ondragend="dragEnd(event)" style="animation-delay: 0.06s;">
      <div class="link-icon">🎵</div>
      <div class="link-body">
        <div class="link-name">Bilibili</div>
        <div class="link-url">https://bilibili.com</div>
        <div class="link-tags"><span class="link-tag">视频</span><span class="link-tag">二次元</span></div>
      </div>
      <div class="link-actions">
           <button class="la-btn" onclick="event.preventDefault();event.stopPropagation();editLink('_jhz520lc')" title="改一下">✏️</button>
           <button class="la-btn del" onclick="event.preventDefault();event.stopPropagation();deleteLink('_jhz520lc')" title="冲掉它">🗑️</button>
         </div>
         <span class="drag-handle" title="拖拽排序">⠿⠿</span>
    </a></div>
</div>

<!-- FAB 悬浮按钮 -->
<button class="fab" onclick="openLinkModal()" title="收藏一波！">＋</button>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="linkModal">
  <div class="modal">
    <div class="modal-title" id="linkModalTitle">🏄 收藏新站点</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">叫什么名字？ *</label>
        <input class="form-input" id="fName" placeholder="例：GitHub" autocomplete="off">
      </div>
      <div class="form-group">

      </div>

      <div class="form-group">
        <label class="form-label">贴几个标签（逗号隔开）</label>

      <div class="form-group">
        <label class="form-label">归到哪个浪区？</label>

<!-- 添加分类弹窗 -->

    </div>
    <div class="modal-actions">
      <button class="m-btn m-btn-cancel" onclick="closeCatModal()">算了</button>
      <button class="m-btn m-btn-save" onclick="saveCategory()">开浪！🏄</button>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="delModal">
  <div class="modal modal-sm">
    <div class="modal-title">🌊 真的要冲掉吗？</div>
    <p style="color:var(--text-sec);font-size:14px;margin-bottom:8px;" id="delText">要把「ChatGPT」冲进海里吗？</p>
    <div class="modal-actions">
      <button class="m-btn m-btn-cancel" onclick="closeDelModal()">留着吧</button>
      <button class="m-btn m-btn-danger" onclick="confirmDelete()">冲掉！</button>
    </div>
  </div>
</div>

<div class="toast show" id="toast">🌊 冲走了！</div>

<script>
const STORAGE_KEY = 'navHub_data';
const ICONS = ['🌐','📚','💻','🎮','🎵','🎬','🛒','📰','🔧','🎨','📊','💬','📧','🗺️','🏠','💡','🔬','📷','✈️','🍔','🏥','📖','🏦','🎯','🌍','⚡','🧩','🤖','☁️','🌱'];

let state = {
  categories: ['全部','常用','开发','摸鱼','设计','生活','学习'],
  activeCategory: '全部',
  editingId: null,
  deletingId: null,
  deletingType: null,
  selectedIcon: '🌐',
  selectedCat: '',
  dragId: null,
};

let links = [];
function genId() { return '_' + Math.random().toString(36).slice(2,10); }

function getDefaultLinks() {
  return [
    { id:genId(), name:'GitHub', url:'https://github.com', icon:'💻', category:'开发', tags:['代码','开源'] },
    { id:genId(), name:'掘金', url:'https://juejin.cn', icon:'📚', category:'开发', tags:['技术','前端'] },
    { id:genId(), name:'Figma', url:'https://figma.com', icon:'🎨', category:'设计', tags:['UI','协作'] },
    { id:genId(), name:'Notion', url:'https://notion.so', icon:'📝', category:'常用', tags:['笔记','效率'] },
    { id:genId(), name:'YouTube', url:'https://youtube.com', icon:'🎬', category:'摸鱼', tags:['视频','下饭'] },
    { id:genId(), name:'淘宝', url:'https://taobao.com', icon:'🛒', category:'生活', tags:['购物'] },
    { id:genId(), name:'Bilibili', url:'https://bilibili.com', icon:'🎵', category:'摸鱼', tags:['视频','二次元'] },
    { id:genId(), name:'Google Scholar', url:'https://scholar.google.com', icon:'📖', category:'学习', tags:['论文','学术'] },
    { id:genId(), name:'ChatGPT', url:'https://chat.openai.com', icon:'🤖', category:'常用', tags:['AI','对话'] },
    { id:genId(), name:'Dribbble', url:'https://dribbble.com', icon:'🎯', category:'设计', tags:['灵感','UI'] },
    { id:genId(), name:'Stack Overflow', url:'https://stackoverflow.com', icon:'💬', category:'开发', tags:['问答','编程'] },
    { id:genId(), name:'豆瓣', url:'https://douban.com', icon:'📖', category:'摸鱼', tags:['书影音'] },
  ];
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.links && Array.isArray(d.links) && d.links.length > 0) {
        links = d.links;
        state.categories = d.categories || state.categories;
      } else {
        links = getDefaultLinks();
        save();
      }
    } else {
      links = getDefaultLinks();
      save();
    }
  } catch(e) {
    links = getDefaultLinks();
    save();
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ categories: state.categories, links }));
}

// ===== 判断是否移动端 =====
function isMobile() {
  return window.innerWidth <= 768;
}

// ===== 渲染 =====
function renderTabs() {
  const bar = document.getElementById('tabsBar');
  const counts = {};
  links.forEach(l => { counts[l.category] = (counts[l.category]||0)+1; });
  bar.innerHTML = state.categories.map(cat => {
    const active = cat === state.activeCategory ? 'active' : '';
    const cnt = cat === '全部' ? links.length : (counts[cat]||0);
    const delBtn = cat !== '全部'
      ? `<button class="tab-del" onclick="event.stopPropagation();deleteCategory('${cat}')" title="删掉">✕</button>`
      : '';
    return `<button class="tab ${active}" onclick="selectCategory('${cat}')">${cat} <span class="count">${cnt}</span>${delBtn}</button>`;
  }).join('') + `<button class="tab-add" onclick="openCatModal()" title="开辟新浪区">＋</button>`;
}

function renderLinks() {
  const grid = document.getElementById('linkGrid');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = links;
  if (state.activeCategory !== '全部') filtered = filtered.filter(l => l.category === state.activeCategory);
  if (q) filtered = filtered.filter(l =>
    l.name.toLowerCase().includes(q) || l.url.toLowerCase().includes(q) ||
    (l.tags||[]).some(t => t.toLowerCase().includes(q))
  );

  if (!filtered.length) {
    const msg = q
      ? { icon:'🔍', text:'什么都没捞到呢…', sub:'换个关键词再冲一波？' }
      : { icon:'🌊', text:'这片浪区还是空的！', sub:'快去收藏几个站点冲起来～' };
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">
      <div class="empty-icon">${msg.icon}</div><div class="empty-text">${msg.text}</div><div class="empty-sub">${msg.sub}</div>
    </div>`;
    return;
  }

  const mobile = isMobile();

  grid.innerHTML = filtered.map(l => {
    const actionsHtml = mobile
      ? `<div class="link-card-actions-row">
           <button class="mobile-action-btn goto-btn" onclick="event.preventDefault();event.stopPropagation();window.open('${escAttr(l.url)}','_blank')">🔗 打开</button>
           <button class="mobile-action-btn edit-btn" onclick="event.preventDefault();event.stopPropagation();editLink('${l.id}')">✏️ 改</button>
           <button class="mobile-action-btn del-btn" onclick="event.preventDefault();event.stopPropagation();deleteLink('${l.id}')">🗑️ 冲掉</button>
         </div>`
      : `<div class="link-actions">
           <button class="la-btn" onclick="event.preventDefault();event.stopPropagation();editLink('${l.id}')" title="改一下">✏️</button>
           <button class="la-btn del" onclick="event.preventDefault();event.stopPropagation();deleteLink('${l.id}')" title="冲掉它">🗑️</button>
         </div>
         <span class="drag-handle" title="拖拽排序">⠿⠿</span>`;

    return `<a class="link-card" href="${escAttr(l.url)}" target="_blank" rel="noopener"
      ${mobile ? '' : `draggable="true" ondragstart="dragStart(event,'${l.id}')" ondragover="dragOver(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'${l.id}')" ondragend="dragEnd(event)"`}>
      <div class="link-icon">${l.icon||'🌐'}</div>
      <div class="link-body">
        <div class="link-name">${escHtml(l.name)}</div>
        <div class="link-url">${escHtml(l.url)}</div>
        <div class="link-tags">${(l.tags||[]).map(t=>`<span class="link-tag">${escHtml(t)}</span>`).join('')}</div>
      </div>
      ${actionsHtml}
    </a>`;
  }).join('');

  // 动画：绑定涟漪 + 光晕 + 入场
  requestAnimationFrame(() => {
    document.querySelectorAll('.link-card').forEach(card => {
      card.addEventListener('click', addRipple);
      card.addEventListener('mousemove', trackMouseGlow);
    });
    animateCards();
  });
}

// ===== 分类芯片（弹窗内） =====
function renderCatChips() {
  const container = document.getElementById('catChips');
  const cats = state.categories.filter(c => c !== '全部');
  container.innerHTML = cats.map(c =>
    `<button class="cat-chip ${c === state.selectedCat ? 'active' : ''}" onclick="selectCatChip('${c}')">${escHtml(c)}</button>`
  ).join('') + `<button class="cat-chip" onclick="inlineAddCategory()" style="border-style:dashed;color:var(--accent);">＋新建</button>`;
}

function selectCatChip(cat) {
  state.selectedCat = cat;
  renderCatChips();
}

function inlineAddCategory() {
  const name = prompt('新浪区叫什么名字？');
  if (!name || !name.trim()) return;
  const n = name.trim();
  if (state.categories.includes(n)) { toast('这个浪区已经存在啦！'); return; }
  state.categories.push(n);
  state.selectedCat = n;
  save();
  renderCatChips();
  renderTabs();
  toast('🌊 新浪区「'+n+'」开辟成功！');
}

function renderIconPicker() {
  document.getElementById('iconPicker').innerHTML = ICONS.map(ic =>
    `<button class="icon-opt ${ic===state.selectedIcon?'selected':''}" onclick="selectIcon('${ic}')">${ic}</button>`
  ).join('');
}

// ===== 分类 =====
function selectCategory(cat) { state.activeCategory = cat; renderTabs(); renderLinks(); }

function openCatModal() {
  document.getElementById('catName').value = '';
  document.getElementById('catModal').classList.add('open');
  setTimeout(() => document.getElementById('catName').focus(), 200);
}
function closeCatModal() { document.getElementById('catModal').classList.remove('open'); }

function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  if (!name) return toast('总得取个名字吧～');
  if (state.categories.includes(name)) return toast('这个浪区已经存在啦！');
  state.categories.push(name);
  save(); closeCatModal(); renderTabs();
  toast('🌊 新浪区「'+name+'」开辟成功！');
}

function deleteCategory(cat) {
  const cnt = links.filter(l => l.category === cat).length;
  state.deletingType = 'category';
  state.deletingId = cat;

function dragStart(e, id) {

function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragEnter(e) { e.preventDefault(); const c = e.target.closest('.link-card'); if (c) c.classList.add('drag-over'); }
function dragLeave(e) { const c = e.target.closest('.link-card'); if (c) c.classList.remove('drag-over'); }
function drop(e, targetId) {
  e.preventDefault();
  const c = e.target.closest('.link-card'); if (c) c.classList.remove('drag-over');
  if (state.dragId === targetId) return;
  const fromIdx = links.findIndex(l => l.id === state.dragId);
  const toIdx = links.findIndex(l => l.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = links.splice(fromIdx, 1);
  links.splice(toIdx, 0, moved);
  save(); renderLinks();
}
function dragEnd() {
  document.querySelectorAll('.link-card').forEach(c => c.classList.remove('dragging','drag-over'));

// ===== 导出当前网页（完整功能副本） =====

    '<title>想要干点什么?</title>\n<style>\n' + cssText + '\n</style>\n</head>\n<body>\n' +
    bodyHTML + '\n<script>\n' + exportedScript + '\n<\/script>\n</body>\n</html>';

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '想要干点什么-' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
  toast('📤 导出成功！');
}

// ===== 工具 =====
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let toastTimer;
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800); }

// ===== 卡片入场动画（IntersectionObserver） =====
function animateCards() {
  const cards = document.querySelectorAll('.link-card:not(.visible)');
  if (!cards.length) return;
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        const card = entry.target;
        const idx = Array.from(cards).indexOf(card);
        card.style.animationDelay = (idx * 0.06) + 's';
        card.classList.add('visible');
        observer.unobserve(card);
      }
    });
  }, { threshold: 0.1 });
  cards.forEach(card => observer.observe(card));
}

// ===== 涟漪效果 =====
function addRipple(e) {
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  card.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

// ===== 鼠标跟随光晕 =====
function trackMouseGlow(e) {
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  card.style.setProperty('--mouse-x', ((e.clientX - rect.left) / rect.width * 100) + '%');
  card.style.setProperty('--mouse-y', ((e.clientY - rect.top) / rect.height * 100) + '%');
}

// ===== 背景粒子 =====
function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const count = Math.min(35, Math.floor(w * h / 30000));
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 2.5 + 1,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      opacity: Math.random() * 0.3 + 0.1,
      hue: Math.random() > 0.5 ? '91,138,255' : '139,107,255',
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.hue},${p.opacity})`;
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > w) p.dx *= -1;
      if (p.y < 0 || p.y > h) p.dy *= -1;
    });
    // 连线
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(91,138,255,${0.06 * (1 - dist/150)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// 滚动阴影
window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 20);
});

// 窗口变化重新渲染（适配横竖屏切换）
let resizeTimer;
window.addEventListener('resize', () => {

  document.getElementById(id).addEventListener('click', e => { if (e.target===e.currentTarget) document.getElementById(id).classList.remove('open'); });
});

// ===== 启动 =====
load(); renderTabs(); renderLinks();
initParticles();
</script>

function closeDelModal() { document.getElementById('delModal').classList.remove('open'); state.deletingId = null; }

function confirmDelete() {
  if (state.deletingType === 'link') {
    links = links.filter(l => l.id !== state.deletingId);
    toast('🌊 冲走了！');
  } else if (state.deletingType === 'category') {
    const cat = state.deletingId;
    links = links.filter(l => l.category !== cat);
    state.categories = state.categories.filter(c => c !== cat);
    if (state.activeCategory === cat) state.activeCategory = '全部';
    toast('🌊 浪区「'+cat+'」已冲走！');
  }
  save(); closeDelModal(); renderTabs(); renderLinks();
}

function selectIcon(ic) { state.selectedIcon = ic; renderIconPicker(); }

// ===== 拖拽排序（仅桌面端） =====
function dragStart(e, id) {
  state.dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`a.link-card[ondragstart*="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragEnter(e) { e.preventDefault(); const c = e.target.closest('.link-card'); if (c) c.classList.add('drag-over'); }
function dragLeave(e) { const c = e.target.closest('.link-card'); if (c) c.classList.remove('drag-over'); }
function drop(e, targetId) {
  e.preventDefault();
  const c = e.target.closest('.link-card'); if (c) c.classList.remove('drag-over');
  if (state.dragId === targetId) return;
  const fromIdx = links.findIndex(l => l.id === state.dragId);
  const toIdx = links.findIndex(l => l.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = links.splice(fromIdx, 1);
  links.splice(toIdx, 0, moved);
  save(); renderLinks();
}
function dragEnd() {
  document.querySelectorAll('.link-card').forEach(c => c.classList.remove('dragging','drag-over'));
  state.dragId = null;
}

// ===== 导出当前网页（完整功能副本） =====
function exportHTML() {
  save();

  const cssText = document.querySelector('style').textContent;
  const scriptText = document.querySelector('script').textContent;
  const bodyHTML = document.body.innerHTML;

  // 导出版脚本：开头加标志
  const exportedScript = "window.__exported=true;\n" + scriptText;

  const html = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8">\n' +
    '<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">\n' +
    '<title>想要干点什么?</title>\n<style>\n' + cssText + '\n</style>\n</head>\n<body>\n' +
    bodyHTML + '\n<script>\n' + exportedScript + '\n<\/script>\n</body>\n</html>';

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '想要干点什么-' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
  toast('📤 导出成功！');
}

// ===== 工具 =====
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let toastTimer;
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800); }

// ===== 卡片入场动画（IntersectionObserver） =====
function animateCards() {
  const cards = document.querySelectorAll('.link-card:not(.visible)');
  if (!cards.length) return;
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        const card = entry.target;
        const idx = Array.from(cards).indexOf(card);
        card.style.animationDelay = (idx * 0.06) + 's';
        card.classList.add('visible');
        observer.unobserve(card);
      }
    });
  }, { threshold: 0.1 });
  cards.forEach(card => observer.observe(card));
}

// ===== 涟漪效果 =====
function addRipple(e) {
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  card.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

// ===== 鼠标跟随光晕 =====
function trackMouseGlow(e) {
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  card.style.setProperty('--mouse-x', ((e.clientX - rect.left) / rect.width * 100) + '%');
  card.style.setProperty('--mouse-y', ((e.clientY - rect.top) / rect.height * 100) + '%');
}

// ===== 背景粒子 =====
function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const count = Math.min(35, Math.floor(w * h / 30000));
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 2.5 + 1,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      opacity: Math.random() * 0.3 + 0.1,
      hue: Math.random() > 0.5 ? '91,138,255' : '139,107,255',
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.hue},${p.opacity})`;
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > w) p.dx *= -1;
      if (p.y < 0 || p.y > h) p.dy *= -1;
    });
    // 连线
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(91,138,255,${0.06 * (1 - dist/150)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}
